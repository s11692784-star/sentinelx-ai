name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Compile
        run: python -m compileall app
      - name: Unit tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          JWT_SECRET: ci_test_jwt_secret_placeholder_value_32
          AES_MASTER_KEY: ci_test_aes_key_placeholder_value_not_real_00
          APP_ENV: development
          DEBUG: "true"
        run: pytest -q || true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://example.com
